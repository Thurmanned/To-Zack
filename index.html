<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Zack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pink: #ff6fae;
      --gold: #ffd166;
      --cyan: #8be9fd;
      --white: rgba(255, 255, 255, 0.92);
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Poppins", "Microsoft YaHei", Arial, sans-serif;
      background: #090014;
      color: white;
      cursor: pointer;
    }

    .aurora {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 111, 174, 0.38), transparent 32%),
        radial-gradient(circle at 80% 25%, rgba(139, 233, 253, 0.32), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(255, 209, 102, 0.28), transparent 40%),
        linear-gradient(135deg, #100024, #120820 45%, #020715);
      animation: auroraMove 12s ease-in-out infinite alternate;
      z-index: -5;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black, transparent 75%);
      z-index: -4;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -3;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(4px);
      opacity: 0.75;
      animation: floatOrb 8s ease-in-out infinite alternate;
      z-index: -2;
    }

    .orb.one {
      width: 190px;
      height: 190px;
      left: 10%;
      top: 12%;
      background: radial-gradient(circle, rgba(255, 111, 174, 0.55), transparent 70%);
    }

    .orb.two {
      width: 230px;
      height: 230px;
      right: 8%;
      bottom: 10%;
      background: radial-gradient(circle, rgba(139, 233, 253, 0.45), transparent 70%);
      animation-delay: 1.5s;
    }

    .orb.three {
      width: 150px;
      height: 150px;
      right: 22%;
      top: 18%;
      background: radial-gradient(circle, rgba(255, 209, 102, 0.42), transparent 70%);
      animation-delay: 0.8s;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      perspective: 1200px;
    }

    .card {
      position: relative;
      width: min(92vw, 520px);
      min-height: 620px;
      padding: 42px 34px;
      border-radius: 36px;
      background: linear-gradient(145deg, rgba(255,255,255,0.23), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.36);
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.42),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
      transform-style: preserve-3d;
      animation: cardFloat 4.5s ease-in-out infinite;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: conic-gradient(
        from 180deg,
        transparent,
        rgba(255, 111, 174, 0.85),
        rgba(139, 233, 253, 0.75),
        rgba(255, 209, 102, 0.75),
        transparent
      );
      opacity: 0.45;
      filter: blur(20px);
      z-index: -1;
      animation: rotateGlow 8s linear infinite;
    }

    .card::after {
      content: "";
      position: absolute;
      top: -120px;
      left: -160px;
      width: 260px;
      height: 700px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.24), transparent);
      transform: rotate(28deg);
      animation: shine 5.5s ease-in-out infinite;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 26px;
    }

    .heart-core {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), transparent 18%),
        radial-gradient(circle, rgba(255, 111, 174, 0.9), rgba(255, 111, 174, 0.18) 60%, transparent 72%);
      box-shadow:
        0 0 34px rgba(255, 111, 174, 0.75),
        0 0 90px rgba(255, 111, 174, 0.35);
      animation: pulse 1.4s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .heart-core span {
      font-size: 58px;
      filter: drop-shadow(0 10px 18px rgba(255, 70, 130, 0.5));
    }

    h1 {
      text-align: center;
      font-size: clamp(42px, 7vw, 68px);
      line-height: 1;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #fff, #ffd1e7, #8be9fd, #fff);
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textFlow 5s linear infinite;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    .message-box {
      position: relative;
      margin: 0 auto;
      padding: 26px 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.22);
      min-height: 142px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message {
      color: var(--white);
      font-size: 23px;
      line-height: 1.75;
      text-align: center;
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .cursor {
      display: inline-block;
      margin-left: 4px;
      color: var(--pink);
      animation: blink 0.75s infinite;
    }

    .chips {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 28px 0 26px;
    }

    .chip {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.19);
      color: rgba(255,255,255,0.78);
      font-size: 13px;
      animation: chipFloat 3s ease-in-out infinite;
    }

    .chip:nth-child(2) { animation-delay: 0.4s; }
    .chip:nth-child(3) { animation-delay: 0.8s; }

    .footer {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.68);
      font-size: 14px;
    }

    .footer strong {
      color: white;
      font-weight: 600;
    }

    .mini-btn {
      border: 0;
      padding: 11px 15px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, rgba(255,111,174,0.9), rgba(139,233,253,0.75));
      box-shadow: 0 10px 30px rgba(255, 111, 174, 0.25);
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.25s ease;
    }

    .mini-btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .click-heart {
      position: fixed;
      font-size: 30px;
      pointer-events: none;
      z-index: 999;
      animation: heartFly 1.35s ease-out forwards;
      filter: drop-shadow(0 8px 14px rgba(255, 80, 140, 0.35));
    }

    .spark {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 998;
      background: white;
      animation: sparkBurst 800ms ease-out forwards;
    }

    @keyframes auroraMove {
      0% { filter: hue-rotate(0deg); transform: scale(1); }
      100% { filter: hue-rotate(35deg); transform: scale(1.08); }
    }

    @keyframes floatOrb {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(38px, -32px, 0) scale(1.08); }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) rotateX(0deg); }
      50% { transform: translateY(-13px) rotateX(1.5deg); }
    }

    @keyframes rotateGlow {
      to { transform: rotate(360deg); }
    }

    @keyframes shine {
      0%, 48% { transform: translateX(-360px) rotate(28deg); opacity: 0; }
      55% { opacity: 1; }
      100% { transform: translateX(860px) rotate(28deg); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes textFlow {
      to { background-position: 300%; }
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes chipFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes heartFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -220%) scale(2.1) rotate(24deg);
      }
    }

    @keyframes sparkBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0);
      }
    }

    @media (max-width: 560px) {
      .card {
        min-height: 590px;
        padding: 34px 24px;
      }

      .message {
        font-size: 20px;
      }

      .footer {
        left: 24px;
        right: 24px;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="noise"></div>
  <canvas id="stars"></canvas>

  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="wrap">
    <section class="card" id="card">
      <div class="badge">✨ A little blessing from Sydney</div>

      <div class="heart-core">
        <span>💖</span>
      </div>

      <h1>To Zack</h1>
      <div class="subtitle">May every day be bright</div>

      <div class="message-box">
        <div class="message">
          <span id="typeText"></span><span class="cursor">|</span>
        </div>
      </div>

      <div class="chips">
        <div class="chip">Good luck 🍀</div>
        <div class="chip">Big smile 😊</div>
        <div class="chip">Bright future 🌟</div>
      </div>

      <div class="footer">
        <span>—— 来自悉尼的 <strong>LIMI</strong></span>
        <button class="mini-btn" id="surpriseBtn">Click for love</button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      makeStars();
    }

    function makeStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 8500);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.6 + 0.4,
          vx: (Math.random() - 0.5) * 0.28,
          vy: (Math.random() - 0.5) * 0.28,
          alpha: Math.random() * 0.7 + 0.25
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;

        if (s.x < 0 || s.x > canvas.width) s.vx *= -1;
        if (s.y < 0 || s.y > canvas.height) s.vy *= -1;

        const dx = s.x - mouse.x;
        const dy = s.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(mouse.x, mouse.y);
          ctx.lineTo(s.x, s.y);
          ctx.strokeStyle = "rgba(255,255,255," + (1 - dist / 120) * 0.25 + ")";
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")";
        ctx.fill();
      }

      requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", resize);
    document.addEventListener("mousemove", function(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;

      if (Math.random() > 0.82) {
        createHeart(e.clientX, e.clientY, true);
      }
    });

    resize();
    drawStars();

    const text = "愿你天天开心，万事顺意，前程似锦。愿所有美好的事情，都慢慢向你靠近。";
    const typeTarget = document.getElementById("typeText");
    let index = 0;

    function typeWriter() {
      if (index <= text.length) {
        typeTarget.textContent = text.slice(0, index);
        index++;
        setTimeout(typeWriter, 95);
      }
    }

    setTimeout(typeWriter, 600);

    const hearts = ["💖", "💕", "💗", "💘", "💝", "❤️", "💞"];

    function createHeart(x, y, small=false) {
      const heart = document.createElement("div");
      heart.className = "click-heart";
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = x + "px";
      heart.style.top = y + "px";
      heart.style.fontSize = small ? (14 + Math.random() * 10) + "px" : (28 + Math.random() * 22) + "px";
      document.body.appendChild(heart);

      setTimeout(function() {
        heart.remove();
      }, 1350);
    }

    function createSpark(x, y) {
      for (let i = 0; i < 18; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = x + "px";
        spark.style.top = y + "px";
        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 90;
        spark.style.setProperty("--x", Math.cos(angle) * distance + "px");
        spark.style.setProperty("--y", Math.sin(angle) * distance + "px");
        spark.style.background = Math.random() > 0.5 ? "rgba(255,111,174,0.95)" : "rgba(139,233,253,0.95)";
        document.body.appendChild(spark);

        setTimeout(function() {
          spark.remove();
        }, 800);
      }
    }

    document.addEventListener("click", function(e) {
      createHeart(e.clientX, e.clientY);
      createSpark(e.clientX, e.clientY);
    });

    document.getElementById("surpriseBtn").addEventListener("click", function(e) {
      e.stopPropagation();
      const rect = this.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      for (let i = 0; i < 24; i++) {
        setTimeout(function() {
          createHeart(
            x + (Math.random() - 0.5) * 260,
            y + (Math.random() - 0.5) * 160
          );
        }, i * 35);
      }

      createSpark(x, y);
    });

    const card = document.getElementById("card");

    document.addEventListener("mousemove", function(e) {
      const rect = card.getBoundingClientRect();
      const cardX = rect.left + rect.width / 2;
      const cardY = rect.top + rect.height / 2;
      const rotateY = (e.clientX - cardX) / 38;
      const rotateX = -(e.clientY - cardY) / 44;
      card.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
    });

    document.addEventListener("mouseleave", function() {
      card.style.transform = "";
    });
  </script>
</body>
</html>
